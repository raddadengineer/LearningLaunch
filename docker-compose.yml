version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: learninglaunch_db
      POSTGRES_USER: learninglaunch_user
      POSTGRES_PASSWORD: learninglaunch_password
    volumes:
      - learninglaunch_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learninglaunch_user -d learninglaunch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3456:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://learninglaunch_user:learninglaunch_password@postgres:5432/learninglaunch_db
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=learninglaunch_user
      - PGPASSWORD=learninglaunch_password
      - PGDATABASE=learninglaunch_db
      - SESSION_SECRET=your-super-secret-session-key-change-this-in-production
      - KOKORO_URL=<server-ip>/v1/audio/speech
      - KOKORO_VOICE=af_heart
    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"] 
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  learninglaunch_postgres_data:
    driver: local
